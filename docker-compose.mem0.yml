networks:
  mem0net:
    name: mem0net

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    networks:
      - mem0net
    volumes:
      - ~/mem0-data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  mem0:
    build: ./mem0-server
    restart: unless-stopped
    networks:
      - mem0net
    ports:
      - "172.17.0.1:8050:8000"
    environment:
      - LLM_PROVIDER=openai
      - LLM_MODEL=google/gemma-3-4b-it
      - LLM_API_KEY=${OPENROUTER_API_KEY}
      - LLM_OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - EMBEDDER_MODEL=openai/text-embedding-3-small
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
